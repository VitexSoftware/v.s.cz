paths:
    migrations: '%%PHINX_CONFIG_DIR%%/db/migrations'
    seeds: '%%PHINX_CONFIG_DIR%%/db/seeds'

environments:
    default_migration_table: phinxlog
    default_environment: development
    production:
        adapter: mysql
        host: '%%DB_HOST%%'
        name: '%%DB_DATABASE%%'
        user: '%%DB_USERNAME%%'
        pass: '%%DB_PASSWORD%%'
        port: '%%DB_PORT%%'
        charset: utf8mb4

    development:
        adapter: mysql
        host: '%%DB_HOST%%'
        name: '%%DB_DATABASE%%'
        user: '%%DB_USERNAME%%'
        pass: '%%DB_PASSWORD%%'
        port: '%%DB_PORT%%'
        charset: utf8mb4

    testing:
        adapter: pgsql
        host: localhost
        name: vitexsoftware
        user: vitexsoftware
        pass: vitexsoftware
        port: 5432
        charset: utf8
